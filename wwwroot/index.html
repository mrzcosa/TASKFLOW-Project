<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TaskFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<div class="container">

    <!-- ==========================================
                     HEADER
    ========================================== -->

    <div class="header">
        <h1>TASKFLOW</h1>
        <p>Manage tasks, deadlines and rewards efficiently.</p>
    </div>

    <!-- ==========================================
                     SUMMARY CARDS
    ========================================== -->

    <div class="cards">

        <div class="card">
            <h3>Total Tasks</h3>
            <h2 id="totalTasks">0</h2>
        </div>

        <div class="card">
            <h3>Pending Tasks</h3>
            <h2 id="pendingTasks">0</h2>
        </div>

        <div class="card">
            <h3>Completed Tasks</h3>
            <h2 id="completedTasks">0</h2>
        </div>

    </div>

    <!-- ==========================================
                     TASK FORM
    ========================================== -->

    <div class="section">

        <div class="section-title">
            Add New Task
        </div>

        <div class="form-grid">

            <input id="title" placeholder="Task Title">

            <input id="dueDate" type="date">

            <select id="priority">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
            </select>

            <select id="status">
                <option selected>Pending</option>
                <option>Completed</option>
            </select>

            <input id="estimatedHours"
                   type="number"
                   placeholder="Estimated Hours">

            <input id="reward"
                   placeholder="Reward For Completion">

            <button class="btn-primary"
                    onclick="addTask()">
                Add Task
            </button>

        </div>

    </div>

    <!-- ==========================================
                     SEARCH
    ========================================== -->

    <div class="search-box">

        <input id="search"
               placeholder="Search task title..."
               onkeyup="renderTasks()">

    </div>

    <!-- ==========================================
                     TASK TABLE
    ========================================== -->

    <div class="section table-wrapper">

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Hours</th>
                    <th>Reward</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="taskTable"></tbody>

        </table>

    </div>

</div>

<script>

// ==========================================
//             GLOBAL STATE
// ==========================================

let tasks = [];

// ==========================================
//             INITIALIZATION
// ==========================================

document.addEventListener('DOMContentLoaded', () => {
    loadTasks();
});

// ==========================================
//             API FUNCTIONS
// ==========================================

async function loadTasks(){

    try{

        const response =
            await fetch('/tasks');

        tasks =
            await response.json();

        updateCards();
        renderTasks();

    }catch(error){

        console.error(error);

        alert('Unable to load tasks.');
    }
}

async function addTask(){

    const payload = getFormData();

    try{

        const response =
            await fetch('/tasks',{

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify(payload)
            });

        if(!response.ok){

            const message =
                await response.text();

            throw new Error(message);
        }

        clearForm();

        loadTasks();

    }catch(error){

        alert(error.message);
    }
}

async function deleteTask(id){

    if(!confirm('Delete this task?'))
        return;

    await fetch(`/tasks/${id}`,{
        method:'DELETE'
    });

    loadTasks();
}

// ==========================================
//             FORM HELPERS
// ==========================================

function getFormData(){

    return{

        title:
            document.getElementById('title').value,

        dueDate:
            document.getElementById('dueDate').value,

        priority:
            document.getElementById('priority').value,

        status:
            document.getElementById('status').value,

        estimatedHours:
            parseInt(
                document.getElementById('estimatedHours').value
            ) || 0,

        rewardForCompletion:
            document.getElementById('reward').value
    };
}

function clearForm(){

    document.getElementById('title').value='';
    document.getElementById('estimatedHours').value='';
    document.getElementById('reward').value='';
}

// ==========================================
//             UI FUNCTIONS
// ==========================================

function updateCards(){

    const total =
        tasks.length;

    const pending =
        tasks.filter(task =>
            task.status === 'Pending'
        ).length;

    const completed =
        tasks.filter(task =>
            task.status === 'Completed'
        ).length;

    document.getElementById('totalTasks').textContent =
        total;

    document.getElementById('pendingTasks').textContent =
        pending;

    document.getElementById('completedTasks').textContent =
        completed;
}

function renderTasks(){

    const searchText =
        document.getElementById('search')
        .value
        .toLowerCase();

    const filteredTasks =
        tasks.filter(task =>
            task.title.toLowerCase()
            .includes(searchText)
        );

    let html = '';

    filteredTasks.forEach(task => {

        html += `
        <tr>

            <td>${task.id}</td>

            <td>${task.title}</td>

            <td>
                ${new Date(task.dueDate)
                    .toLocaleDateString()}
            </td>

            <td>${task.priority}</td>

            <td>
                <span class="badge ${task.status === 'Completed'
                    ? 'completed'
                    : 'pending'}">

                    ${task.status}

                </span>
            </td>

            <td>${task.estimatedHours}</td>

            <td>${task.rewardForCompletion}</td>

            <td>
                <button
                    class="btn-danger"
                    onclick="deleteTask(${task.id})">
                    Delete
                </button>
            </td>

        </tr>`;
    });

    document.getElementById('taskTable').innerHTML =
        html;
}

</script>
