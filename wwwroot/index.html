<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TaskFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<div class="container">

    <!-- ==========================================
         HEADER
    ========================================== -->

    <div class="header">
        <h1>TASKFLOW</h1>
        <p>Manage tasks, deadlines and rewards efficiently.</p>
    </div>

    <!-- ==========================================
         SUMMARY CARDS
    ========================================== -->

    <div class="cards">

        <div class="card">
            <h3>Total Tasks</h3>
            <h2 id="totalTasks">0</h2>
        </div>

        <div class="card">
            <h3>Pending Tasks</h3>
            <h2 id="pendingTasks">0</h2>
        </div>

        <div class="card">
            <h3>Completed Tasks</h3>
            <h2 id="completedTasks">0</h2>
        </div>

    </div>

    <!-- ==========================================
         ANALYTICS CHARTS
    ========================================== -->

    <div class="cards analytics-row">

        <div class="card">
            <h3>Task Status Overview</h3>
            <canvas id="statusChart"></canvas>
        </div>

        <div class="card">
            <h3>Priority Distribution</h3>
            <canvas id="priorityChart"></canvas>
        </div>

    </div>

    <!-- ==========================================
         TASK FORM
    ========================================== -->

    <div class="section">

        <div class="section-title">
            Add New Task
        </div>

        <div class="form-grid">

            <input id="title"
                   placeholder="Task Title">

            <input id="dueDate"
                   type="date">

            <select id="priority">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
            </select>

            <select id="status">
                <option selected>Pending</option>
                <option>Completed</option>
            </select>

            <input id="estimatedHours"
                   type="number"
                   placeholder="Estimated Hours">

            <input id="reward"
                   placeholder="Reward For Completion">

            <button class="btn-primary"
                    onclick="addTask()">
                Add Task
            </button>

        </div>

    </div>

    <!-- ==========================================
         SEARCH
    ========================================== -->

    <div class="search-box">

        <input id="search"
               placeholder="Search task title..."
               onkeyup="renderTasks()">

    </div>

    <!-- ==========================================
         TASK TABLE
    ========================================== -->

    <div class="section table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Hours</th>
                    <th>Reward</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="taskTable"></tbody>

        </table>

    </div>

</div>

<!-- ==========================================
     JAVASCRIPT FILES
========================================== -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
<script src="js/modal.js"></script>
<script src="js/toast.js"></script>

</body>
</html>
